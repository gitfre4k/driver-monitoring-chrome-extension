<div class="dialog">
  <div class="violation-report">
    <mat-icon>article</mat-icon>
    <h3 mat-dialog-title>Analysis completed.</h3>
  </div>
  @if (analyzeError && analyzeError.length > 0) {
  <mat-dialog-content>
    error count: {{ analyzeError.length }}
    <br />
    <br />
    @for (err of analyzeError; track err.driverName) {
    <span class="errors-company"
      >[{{ err.error.name }}] {{ err.company.name }}
      {{ err.driverName ? " - " + err.driverName : "" }}</span
    >
    <span>- {{ err.error.message }}</span>
    <br />

    }
  </mat-dialog-content>
  }

  <mat-dialog-actions>
    <button mat-button mat-dialog-close>OK</button>
  </mat-dialog-actions>
</div>
