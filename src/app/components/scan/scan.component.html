<div class="scan">
  @if (!scanning()) {
  <!--////////////////////  -->
  <!-- Violations -->
  <fieldset class="scan-violations">
    <legend>Violations</legend>
    <div class="scan-violations__sync">
      <mat-checkbox class="scan-violations__sync-check" [(ngModel)]="checked"
        >auto scan<br />
        every 5min</mat-checkbox
      >
      <div class="scan-violations__sync-stats">
        @if (vLastSync(); as lastSync) {
        <span>
          last sync: <br />
          {{ vLastSync() | date : "shortTime" }}</span
        >
        }

        <a
          mat-icon-button
          (click)="startViolationsScan()"
          matTooltip="Check for violations"
        >
          <mat-icon class="icon-display">sync</mat-icon></a
        >
      </div>
    </div>

    <!-- radio buttons -->
    <div class="scan-violations__options">
      <mat-radio-group class="scan-violations__options-radio">
        <mat-radio-button
          class="scan-violations__options-radio-button"
          [value]="'week'"
          [ariaSetSize]="1"
          >last week</mat-radio-button
        >

        <mat-radio-button
          class="scan-violations__options-radio-button"
          [value]="'mounth'"
          >last month</mat-radio-button
        >
        <mat-radio-button
          class="scan-violations__options-radio-button"
          [value]="'custom'"
        >
          <div class="scan-violations__options-radio-button-custom">
            <!-- hidden date range input -->
            <mat-form-field style="visibility: hidden; width: 0; height: 0">
              <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
                <input
                  matStartDate
                  formControlName="dateFrom"
                  placeholder="Start date"
                />
                <input
                  matEndDate
                  formControlName="dateTo"
                  placeholder="End date"
                />
              </mat-date-range-input>
            </mat-form-field>
            <!-- calendar opener -->
            <mat-date-range-picker #picker></mat-date-range-picker>

            <span style="font-size: 10px"
              >{{ range.value.dateFrom | date : "mediumDate" }} - <br />
              {{ range.value.dateTo | date : "mediumDate" }}</span
            >
            <a
              mat-icon-button
              (click)="picker.open()"
              matTooltip="Select date range"
              class="scan-violations__options-radio-button-custom-calendar"
            >
              <mat-icon
                class="scan-violations__options-radio-button-custom-calendar-icon"
                >calendar_month</mat-icon
              >
            </a>
          </div>
        </mat-radio-button>
      </mat-radio-group>
    </div>
  </fieldset>

  <app-advanced-scan></app-advanced-scan>

  <button
    [disabled]="disableScan"
    mat-raised-button
    (click)="startScan()"
    class="scan-submit"
  >
    Scan
  </button>

  } @else {
  <app-progress-bar
    [scanSubscription]="scanSubscribtion"
    [scanMode]="scanMode.value"
  ></app-progress-bar>
  }
</div>
