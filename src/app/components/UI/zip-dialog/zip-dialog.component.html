<div class="zip">
    <h1 class="zip__title">Zip</h1>
    <mat-radio-group class="zip__mode" [(ngModel)]="zipService.selectedMode">
        <mat-radio-button [value]="0">"Be Gentle!" (64-68mph)</mat-radio-button>

        <mat-radio-button [value]="1">"Hey, Not Too Rough" (68-72mph)</mat-radio-button>

        <mat-radio-button [value]="2">Deadly Overkill Technique (74.99mph)</mat-radio-button>

    </mat-radio-group>


    @if (data.length) {
    <div class="zip__delete">
        <h3>Events to delete:</h3>
        <ul>
            @for (delEvent of data; track delEvent.id) {
            <li>
                <span>{{delEvent.realStartTime | date: 'MMM d, h:mm a'}}</span> <span>- {{delEvent.statusName}}</span>
            </li>
            }
        </ul>
    </div>
    }

    <div class="zip__buttons">
        <button mat-button (click)="onCancel()">Cancel</button>
        <button mat-raised-button color="primary" cdkFocusInitial (click)="onProceed()">Proceed</button>
    </div>
</div>
