<div class="add-note">
  <h2 mat-dialog-title>Add Note</h2>
  <mat-dialog-content>
    <mat-form-field class="add-note__form">
      <mat-label>Company</mat-label>
      <input matInput [(ngModel)]="company" />
    </mat-form-field>

    <mat-form-field class="add-note__form">
      <mat-label>Note</mat-label>
      <textarea
        matInput
        placeholder="Ex. Kreten vozi diskonektovan kmee kmeee..."
        [(ngModel)]="note"
      ></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button matButton (click)="onNoClick()">No Thanks</button>
    <button matButton [mat-dialog-close]="note()" cdkFocusInitial>Ok</button>
  </mat-dialog-actions>
</div>
